services:
  # 1. PostgreSQL (with pgvector for AI Embeddings)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: trajectory_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: skillmatching
    ports:
      - "5433:5432"
    volumes:
      - trajectory_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Apache Kafka (Confluent Image - Native KRaft Mode)
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: trajectory_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - trajectory_kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # 3. Neo4j (Career Graph Database)
  neo4j:
    image: neo4j:5
    container_name: trajectory_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # HTTP Web Browser (For viewing nodes)
      - "7687:7687" # Bolt protocol (Used by Spring Boot to send queries)
    volumes:
      - trajectory_neo4j_data:/data
      - trajectory_neo4j_logs:/logs
    restart: unless-stopped

  # 4. MinIO (S3-Compatible Object Storage for Resumes)
  minio:
    image: minio/minio:latest
    container_name: trajectory_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_USER}
    ports:
      - "9000:9000" # API Port (Spring Boot talks to this one)
      - "9001:9001" # Web UI Console (You look at this in your browser)
    command: server /data --console-address ":9001"
    volumes:
      - trajectory_minio_data:/data
    restart: unless-stopped

# Declaring all the secure Docker-managed volumes
volumes:
  trajectory_pg_data:
  trajectory_kafka_data:
  trajectory_neo4j_data:
  trajectory_neo4j_logs:
  trajectory_minio_data: # <-- Added the MinIO storage vault here

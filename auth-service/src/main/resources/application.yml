server:
  port: 8081

spring:
  application:
    name: auth-service

  # Database Connection Settings (Matching your Docker setup!)
  datasource:
    url: jdbc:postgresql://localhost:5433/skillmatching
    username: admin
    password: db123
    driver-class-name: org.postgresql.Driver

  # Hibernate Settings (This auto-creates our tables!)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
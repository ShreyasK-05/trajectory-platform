server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server: # <-- NEW REQUIRED PREFIX
        webmvc: # <-- NEW REQUIRED PREFIX
          routes:
            - id: auth-service-route
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
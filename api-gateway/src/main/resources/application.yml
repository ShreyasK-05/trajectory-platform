server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
      server:
        webmvc:
          routes:
            - id: auth-service-route
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**
            - id: profile-service-route
              uri: lb://USER-PROFILE-SERVICE
              predicates:
                - Path=/profile/**
            - id: jobs-service-route
              uri: lb://USER-PROFILE-SERVICE
              predicates:
                - Path=/jobs/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true